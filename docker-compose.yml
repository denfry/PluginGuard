services:
  analyzer:
    build:
      context: ./analyzer
    image: pluginguard-analyzer
    ports:
      - "8080:8080"
    # No CORS env needed: the browser never calls the analyzer directly — the web app
    # proxies /api/* to it server-side over the compose network (see web build args).
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      args:
        # Server-side proxy target for the Next rewrites — reachable on the compose network.
        ANALYZER_URL: "http://analyzer:8080"
    image: pluginguard-web
    ports:
      - "3000:3000"
    depends_on:
      - analyzer
