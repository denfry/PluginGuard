services:
  analyzer:
    build:
      context: ./analyzer
    image: pluginguard-analyzer
    ports:
      - "8080:8080"
    environment:
      # Allow the web app (served from the host browser) to call the API.
      # Spring relaxed binding: pluginguard.cors.allowed-origins -> PLUGINGUARD_CORS_ALLOWEDORIGINS
      PLUGINGUARD_CORS_ALLOWEDORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      args:
        # Baked into the client bundle: the URL the browser uses for the analyzer.
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    image: pluginguard-web
    ports:
      - "3000:3000"
    depends_on:
      - analyzer
