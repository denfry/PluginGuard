# Render Blueprint — deploys PluginGuard as two free Docker web services.
#
# Quick start:
#   1. Push this repo to GitHub.
#   2. Render Dashboard → New → Blueprint → select this repo. Render reads this file.
#   3. Both services build from their Dockerfiles and get automatic HTTPS.
#
# Topology: the browser only ever talks to the WEB service. The web app proxies /api/*
# (server-side, via next.config.ts rewrites) to the analyzer's public URL — so there is
# no CORS, no mixed-content, and no analyzer URL in the client bundle.
#
# The only cross-service value is the web service's `ANALYZER_URL`, pre-filled with the
# analyzer's default hostname `https://pluginguard-analyzer.onrender.com`. If Render
# appended a random suffix to the analyzer's name (only when the name is already taken
# globally), open the analyzer service, copy its real URL, set it as `ANALYZER_URL` on the
# web service, and redeploy the WEB service (the value is baked into the route manifest at
# build time, so it needs a rebuild — not just a restart).
#
# The analyzer must stay PUBLIC: Render free services can send outbound private/public
# requests but cannot RECEIVE private ones, so the web proxy reaches it over its public URL.
#
# Free-plan notes: 512 MB RAM / 0.1 CPU; services spin down after ~15 min idle and take
# ~1 min (+ Spring Boot start) to wake — the first request after idle is slow. Reports are
# in-memory and are lost on each spin-down.

services:
  # --- Java static analyzer (Spring Boot 3.5, Java 21) -----------------------
  - name: pluginguard-analyzer
    type: web
    runtime: docker
    plan: free
    region: frankfurt              # change to your nearest: oregon | ohio | virginia | singapore
    dockerfilePath: ./analyzer/Dockerfile
    dockerContext: ./analyzer
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Don't leak exception messages on the public API (overrides application.yml).
      - key: SERVER_ERROR_INCLUDE_MESSAGE
        value: never
      # Report storage. `memory` = ephemeral (lost on spin-down). For durable /report/{id} links set
      # this to `jdbc` and add SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD — a free, *persistent*
      # Neon Postgres works well (Render's own free DB is deleted after 30 days). See DEPLOY.md.
      - key: PLUGINGUARD_PERSISTENCE
        value: memory

  # --- Next.js 16 web app ----------------------------------------------------
  - name: pluginguard-web
    type: web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./web/Dockerfile
    dockerContext: ./web
    autoDeploy: true
    envVars:
      # The analyzer's PUBLIC URL. The Next server proxies /api/* to it server-side, so the
      # browser stays same-origin. Render passes this as the Docker build ARG of the same
      # name; next.config.ts bakes it into the route manifest at build time, so changing it
      # requires a rebuild/redeploy of the web service (not just a restart).
      - key: ANALYZER_URL
        value: https://pluginguard-analyzer.onrender.com
