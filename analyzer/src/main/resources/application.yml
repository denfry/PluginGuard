server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: pluginguard-analyzer
  servlet:
    multipart:
      # Hard upload ceiling. The JarLoader enforces additional uncompressed-size / zip-bomb guards.
      max-file-size: 50MB
      max-request-size: 55MB
  # Persistence is opt-in via the `postgres` profile (SPRING_PROFILES_ACTIVE=postgres). By default
  # the analyzer runs with an in-memory store, so the JDBC/Flyway auto-configuration is excluded to
  # avoid requiring a database at startup. The `postgres` profile clears these excludes.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

pluginguard:
  cors:
    # Origins allowed to call the analyzer API (the Next.js web app).
    allowed-origins: "http://localhost:3000,http://127.0.0.1:3000"
  limits:
    # zip-bomb / resource guards applied while unpacking an uploaded JAR
    max-total-uncompressed-bytes: 524288000   # 500 MB
    max-entry-uncompressed-bytes: 67108864     # 64 MB per single entry
    max-entries: 50000
    max-compression-ratio: 200                 # uncompressed/compressed per entry
    max-nested-jar-depth: 2
  supply-chain:
    # Phase 2 supply-chain & reputation. OFF by default — these reach the network.
    cve-enabled: false                         # query OSV.dev for CVEs in bundled dependencies
    reputation-enabled: false                  # match jar/nested-jar SHA-256 against reputation lists
    offline: false                             # hard kill-switch: no outbound requests (cache only)
    osv-api-url: "https://api.osv.dev/v1/query"
    cache-dir: ""                              # empty → <java.io.tmpdir>/pluginguard-cache
    cache-ttl-hours: 168                       # 7 days
    timeout-ms: 4000
    retries: 1
    known-malicious-source: ""                 # local file path or http(s) URL (one SHA-256 per line)
    known-good-source: ""                      # local file path or http(s) URL (one SHA-256 per line)
  retention:
    # Stored reports older than this are purged on a schedule (postgres profile only).
    # 0 or negative disables retention (reports are kept indefinitely).
    report-ttl-days: 30
  api:
    # B2B API keys, metering and quotas — only active under the `postgres` profile.
    admin-token: ""              # set (env PLUGINGUARD_API_ADMINTOKEN) to enable POST /api/admin/* provisioning
    anonymous-daily-limit: 200   # free, keyless scans per client IP per day (0 disables the limit)
  sandbox:
    # Phase 3 dynamic sandbox. OFF by default — it actually EXECUTES the uploaded plugin inside a
    # hardened, non-root, network-isolated Docker container. The static analyzer never runs the jar.
    enabled: false
    runner: "docker"
    docker-path: "docker"
    image: "eclipse-temurin:21-jre"
    runtime-jar-path: ""                       # host path to the built sandbox-runtime agent jar
    work-dir: ""                               # empty → <java.io.tmpdir>/pluginguard-sandbox
    timeout-seconds: 20
    memory-mb: 256
    cpus: "1.0"
    pids-limit: 128
    network: "none"                            # full egress isolation (attempts are logged, not routed)
    max-behavior-events: 500

logging:
  level:
    dev.pluginguard: INFO
